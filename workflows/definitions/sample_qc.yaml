main:
  params: [args]
  steps:
    - init:
        assign:
          - dataset: ${args.dataset}
          - classification_methods: ${args.classification_methods}
          - n_iterations: ${args.n_iterations}
          - activity_url: ${args.activity_service_url}
          - workflow_id: ${args.workflow_id}

    - load_clinical:
        call: http.post
        args:
          url: ${activity_url + "/activities/load_clinical_data"}
          body:
            args: [${dataset}]
            workflow_id: ${workflow_id}
          timeout: 300
        result: clinical_response

    - load_molecular:
        call: http.post
        args:
          url: ${activity_url + "/activities/load_molecular_data"}
          body:
            args: [${dataset}, "proteomics"]
            workflow_id: ${workflow_id}
          timeout: 300
        result: molecular_response

    - classification_qc:
        call: http.post
        args:
          url: ${activity_url + "/activities/run_classification_qc"}
          body:
            args: [${dataset}, ${classification_methods}]
            workflow_id: ${workflow_id}
          timeout: 900
        result: classification_response

    - distance_matrix_qc:
        call: http.post
        args:
          url: ${activity_url + "/activities/run_distance_matrix"}
          body:
            args: [${dataset}, ${n_iterations}]
            workflow_id: ${workflow_id}
          timeout: 1200
        result: distance_response

    - cross_validate:
        try:
          call: http.post
          args:
            url: ${activity_url + "/activities/cross_validate_flags"}
            body:
              args:
                - ${classification_response.body.result.flagged_samples}
                - ${distance_response.body.result.flagged_samples}
              workflow_id: ${workflow_id}
            timeout: 300
          result: cross_validation_response
        except:
          as: e
          steps:
            - quarantine:
                call: http.post
                args:
                  url: ${activity_url + "/activities/quarantine_samples"}
                  body:
                    args:
                      - ${classification_response.body.result.flagged_samples}
                    workflow_id: ${workflow_id}
                  timeout: 300
            - raise_error:
                raise: ${e}

    - generate_report:
        call: http.post
        args:
          url: ${activity_url + "/activities/compile_report"}
          body:
            args:
              - clinical_data: ${clinical_response.body.result}
                classification_result: ${classification_response.body.result}
                distance_result: ${distance_response.body.result}
                cross_validation: ${cross_validation_response.body.result}
            workflow_id: ${workflow_id}
          timeout: 300
        result: report_response

    - return_result:
        return:
          report: ${report_response.body.result}
          cross_validation: ${cross_validation_response.body.result}
