main:
  params: [args]
  steps:
    - init:
        assign:
          - activity_url: ${args.activity_service_url}
          - workflow_id: ${args.workflow_id}
          - config: ${args}

    - generate_synthetic_cohort:
        call: http.post
        args:
          url: ${activity_url + "/activities/generate_synthetic_cohort"}
          body:
            args: [${config}]
            workflow_id: ${workflow_id}
          timeout: 600
        result: cohort_response

    - run_baseline:
        call: http.post
        args:
          url: ${activity_url + "/activities/run_pipeline_with_prompts"}
          body:
            kwargs:
              dataset: ${config.dataset}
              target: ${config.target}
              prompt_version: "baseline"
            workflow_id: ${workflow_id}
          timeout: 1800
        result: baseline_response

    - compile_modules:
        call: http.post
        args:
          url: ${activity_url + "/activities/compile_dspy_modules"}
          body:
            kwargs:
              module: ${config.module}
              strategy: ${config.strategy}
              training_path: ${config.training_path}
            workflow_id: ${workflow_id}
          timeout: 1800
        result: compile_response

    - check_compile_result:
        switch:
          - condition: ${compile_response.body.result.status == "skipped"}
            return:
              status: "skipped"
              reason: ${compile_response.body.result.reason}
              baseline: ${baseline_response.body.result}

    - run_optimized:
        call: http.post
        args:
          url: ${activity_url + "/activities/run_pipeline_with_prompts"}
          body:
            kwargs:
              dataset: ${config.dataset}
              target: ${config.target}
              prompt_version: "optimized"
            workflow_id: ${workflow_id}
          timeout: 1800
        result: optimized_response

    - compare_and_deploy:
        call: http.post
        args:
          url: ${activity_url + "/activities/compare_and_deploy"}
          body:
            kwargs:
              module: ${config.module}
              baseline_score: ${baseline_response.body.result.auc}
              optimized_score: ${optimized_response.body.result.auc}
              improvement_threshold: ${config.improvement_threshold}
            workflow_id: ${workflow_id}
          timeout: 300
        result: deploy_response

    - return_result:
        return:
          status: "completed"
          cohort: ${cohort_response.body.result}
          baseline: ${baseline_response.body.result}
          optimized: ${optimized_response.body.result}
          compilation: ${compile_response.body.result}
          deployment: ${deploy_response.body.result}
