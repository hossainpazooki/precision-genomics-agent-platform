main:
  params: [args]
  steps:
    - init:
        assign:
          - dataset: ${args.dataset}
          - target: ${args.target}
          - modalities: ${args.modalities}
          - n_top_features: ${args.n_top_features}
          - activity_url: ${args.activity_service_url}
          - workflow_id: ${args.workflow_id}
          - imputation_results: []
          - feature_panels: []

    - load_and_validate:
        call: http.post
        args:
          url: ${activity_url + "/activities/load_and_validate_data"}
          body:
            args: [${dataset}, ${modalities}]
            workflow_id: ${workflow_id}
          timeout: 300
        result: data_summary_response

    - impute_and_select:
        parallel:
          shared: [imputation_results, feature_panels]
          for:
            value: modality
            in: ${modalities}
            steps:
              - impute:
                  call: http.post
                  args:
                    url: ${activity_url + "/activities/impute_data"}
                    body:
                      args: [${dataset}, ${modality}]
                      workflow_id: ${workflow_id}
                    timeout: 600
                  result: impute_result
              - collect_imputation:
                  assign:
                    - imputation_results: ${list.concat(imputation_results, [impute_result.body.result])}
              - select_features:
                  call: http.post
                  args:
                    url: ${activity_url + "/activities/select_features"}
                    body:
                      args: [${dataset}, ${target}, ${modality}, ${n_top_features}]
                      workflow_id: ${workflow_id}
                    timeout: 900
                  result: feature_result
              - collect_features:
                  assign:
                    - feature_panels: ${list.concat(feature_panels, [feature_result.body.result])}

    - integrate_and_filter:
        call: http.post
        args:
          url: ${activity_url + "/activities/integrate_and_filter"}
          body:
            args: [${feature_panels}]
            workflow_id: ${workflow_id}
          timeout: 300
        result: integrated_response

    - train_and_evaluate:
        call: http.post
        args:
          url: ${activity_url + "/activities/train_and_evaluate"}
          body:
            args: [${dataset}, ${integrated_response.body.result.features}, ${target}]
            workflow_id: ${workflow_id}
          timeout: 900
        result: classification_response

    - interpret:
        call: http.post
        args:
          url: ${activity_url + "/activities/generate_interpretation"}
          body:
            args: [${integrated_response.body.result.features}, ${target}]
            workflow_id: ${workflow_id}
          timeout: 300
        result: interpretation_response

    - compile_report:
        call: http.post
        args:
          url: ${activity_url + "/activities/compile_report"}
          body:
            args:
              - data_summary: ${data_summary_response.body.result}
                integrated: ${integrated_response.body.result}
                classification: ${classification_response.body.result}
                interpretation: ${interpretation_response.body.result}
            workflow_id: ${workflow_id}
          timeout: 300
        result: report_response

    - return_result:
        return: ${report_response.body.result}
