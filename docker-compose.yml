services:
  # --- Infrastructure ---
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: precision_genomics
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- TypeScript Services ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/precision_genomics
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:8000
      NEXT_PUBLIC_APP_NAME: Precision Genomics Agent Platform
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_started

  # --- Python ML Service ---
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.ml
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql://postgres:postgres@db:5432/precision_genomics
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Python MCP Server (legacy, kept for backward compatibility) ---
  mcp-sse:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql://postgres:postgres@db:5432/precision_genomics
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Python Training Worker (unchanged) ---
  training-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "8081:8081"
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql://postgres:postgres@db:5432/precision_genomics
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
